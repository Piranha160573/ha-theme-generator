save_theme:
  name: Theme speichern
  description: Speichert ein vollständiges Home Assistant Theme unter /config/themes/theme_generator.yaml und lädt die Themes neu.
  fields:
    name:
      name: Name
      description: Name des Themes.
      required: true
      selector:
        text:
    yaml:
